<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Real-Time Code Share</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: #1e1e1e;
            color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d2d2d;
            border-bottom: 1px solid #3c3c3c;
        }

        select {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 5px 10px;
            border-radius: 4px;
            margin-right: 10px;
        }

        .btn-danger {
            background: #d9534f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

            .btn-danger:hover {
                background: #c9302c;
            }

        #editor {
            flex-grow: 1;
            width: 100%;
            height: calc(100vh - 60px);
        }

        .controls {
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <h3>Code Share Room: <span id="roomIdDisplay"></span></h3>
        <div class="controls">
            <label for="languageSelect" style="margin-right: 5px;">Syntax: </label>
            <select id="languageSelect">
                <option value="csharp">C#</option>
                <option value="java">Java</option>
                <option value="kotlin">Kotlin</option>
                <option value="javascript">JavaScript</option>
                <option value="typescript">TypeScript</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="json">JSON</option>
            </select>
            <button id="deleteBtn" class="btn-danger">Delete Room</button>
        </div>
    </header>

    <div id="editor"></div>

    <script>
        if (!window.location.hash) {
            window.location.hash = Math.random().toString(36).substring(2, 11);
        }
        const sessionId = window.location.hash.substring(1);
        document.getElementById('roomIdDisplay').innerText = sessionId;

        let editor;
        let isSyncing = false;

        require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: `// Welcome to room ${sessionId}\n// Start typing to share in real-time...`,
                language: 'csharp',
                theme: 'vs-dark',
                automaticLayout: true
            });

            const connection = new signalR.HubConnectionBuilder()
                .withUrl("/hubs/share")
                .withAutomaticReconnect()
                .build();

            connection.start().then(() => {
                connection.invoke("JoinSession", sessionId);

                editor.onDidChangeModelContent(() => {
                    if (isSyncing) return;
                    const code = editor.getValue();
                    const lang = document.getElementById('languageSelect').value;
                    connection.invoke("UpdateCode", sessionId, lang, code);
                });
            });

            connection.on("SyncDocument", (lang, code) => updateEditorState(lang, code));
            connection.on("CodeUpdated", (lang, code) => updateEditorState(lang, code));

            connection.on("DocumentDeleted", () => {
                alert("This document room has been deleted or expired due to inactivity.");
                window.location.hash = "";
                window.location.reload();
            });

            document.getElementById('languageSelect').addEventListener('change', (e) => {
                const lang = e.target.value;
                monaco.editor.setModelLanguage(editor.getModel(), lang);
                connection.invoke("UpdateCode", sessionId, lang, editor.getValue());
            });

            document.getElementById('deleteBtn').addEventListener('click', () => {
                const confirmed = confirm("Are you sure you want to delete this document? This will remove access for all current contributors.");
                if (confirmed) {
                    connection.invoke("DeleteDocument", sessionId).catch(err => console.error(err));
                }
            });
        });

        function updateEditorState(lang, code) {
            isSyncing = true;
            document.getElementById('languageSelect').value = lang;
            monaco.editor.setModelLanguage(editor.getModel(), lang);

            const position = editor.getPosition();
            editor.setValue(code);
            if (position) editor.setPosition(position);
            isSyncing = false;
        }
    </script>
</body>
</html>
